<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кладовая крестиков</title>
    <link type="image/x-icon" rel="icon" href="svg/MainIcon.svg"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="home.html">Главная</a></li>
                <li><a href="gallery.html">Галерея</a></li>
                <li><a href="statistics.html">Статистика</a></li>
            </ul>
            <ul>
                <li id="loginLink">Вход</li>
            </ul>
        </nav>
    </header>
    <main>        
        <article>
            <h1 class="authH1">Авторизация</h1>
            <form action="/auth" method="post" name="authForm" class="authForm">
                <div class="form-group">
                    <label class="authLbl">Логин</label>
                    <input name="login" class="authInput">
                </div>
                <div class="form-group">
                    <label class="authLbl">Пароль</label>
                    <input name="password" class="authInput" type="password" placeholder="Введите пароль">
                </div>
                <button class="authBtn" name="enterBtn">Войти</button>
                <button class="authBtn" name="regBtn" type="button">Регистрация</button>
            </form>
        </article>         
    </main>
    <footer>

    </footer>
    <script>
        document.authForm.regBtn.addEventListener("click", function() {
            window.location.href = 'registration.html';
        })
    </script>
</body>
</html>
