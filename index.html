<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кладовая крестиков</title>
    <link type="image/x-icon" rel="icon" href="svg/MainIcon.svg"/>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="modal.css">
    <script src="scripts/data.js"></script>
    <script src="modal.js" defer></script>    
</head>
<body>
    <header>
        <nav>
            <ul>
                <li>Главная</li>
                <li><a href="index.html">Галерея</a></li>
                <li>Статистика</li>
            </ul>
            <ul>
                <li>Вход</li>
            </ul>
        </nav>
    </header>
    <main>        
        <article>
            <search>
                <form name="searchForm">
                    <p class="textCenter">
                        <input name="searchBox" type="search">
                        <button>Найти</button>
                    </p>
                    <fieldset name="tags">
                        <label class="allTags">
                            <input type="checkbox" name="allTagsCheckBox"> выбрать все
                        </label>
                        <label>
                            <input type="checkbox"> без тегов
                        </label>
                        <label>
                            <input type="checkbox"> праздник
                        </label>
                        <label>
                            <input type="checkbox"> животные
                        </label>
                        <label>
                            <input type="checkbox"> природа
                        </label>
                        <label>
                            <input type="checkbox"> зима
                        </label>
                    </fieldset>
                </form>            
            </search>            
            <div class="gallery" id="gallery">
                <div class="card">
                    <h2>Название</h2>
                    <p class="cardDescription">Описание</p>
                    <div class="imageBox"><img src="images/2248036369a45c1555a433.48884101.jpg" alt="Описание"></div>
                    <p class="cardAuthor">Автор</p>
                </div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
            </div>
        </article>  
        <dialog id="imageModal" aria-labelledby="modalTitle" aria-describedby="modalContent">
            <button class="close-btn" aria-label="Закрыть" onclick="closeModal()">×</button>
            <img id="modalImage" alt="Полное изображение проекта">
        </dialog>       
    </main>
    <footer>

    </footer>
    <script>        
            const gallery = document.getElementById("gallery");            
            function render(data, container) {
                container.innerHTML = "";
                data.forEach((item) => {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <h2>${item.name}</h2>
                        <p>${item.designer}</p>
                        <div class="imageBox"><img src="${item.image}" alt="Описание" onclick="openModal('${item.image}')"></div>
                        <p class="cardAuthor">${item.user}</p>
                    `;
                    card.addEventListener("click", function(event){                                   
                        if (event.target.tagName != "IMG")
                            window.location.href = `project.html?id=${item.id}`;
                    });
                    container.append(card);
                }); 
            }
            render(projects, gallery);
            document.searchForm.addEventListener("submit", function(event) {
                event.preventDefault(); 
                const searchText = event.target.searchBox.value.trim();
                search(searchText);
            });
            document.searchForm.tags.addEventListener("click", event => {
                const target =  event.target.tagName == "LABEL" ? event.target.children[0] : event.target;
                if (target.name == "allTagsCheckBox") {
                    Array.from(event.currentTarget.elements).forEach(item => {
                    item.checked = target.checked;
                    })
                } else if (!target.checked) {
                    target.form.allTagsCheckBox.checked = false;
                } else {                    
                    event.target.form.allTagsCheckBox.checked = 
                        Array.from(target.form.tags.elements).slice(1).every(item => item.checked);
                }
                const submit = new Event("submit", {cancelable: true});
                target.form.dispatchEvent(submit);               
            })
            function search(text) {
                const filtered = filter(text, projects);
                console.log(filtered)
            }
            function filter(criteria, data) {
                return data.filter(item => {
                    return item.name.toLowerCase().includes(criteria.toLowerCase());
                })
            }
    </script>
</body>
</html>
