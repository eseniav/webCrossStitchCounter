<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кладовая крестиков</title>
    <link type="image/x-icon" rel="icon" href="svg/MainIcon.svg"/>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="modal.css">
    <script src="scripts/data.js"></script>
    <script src="modal.js" defer></script>    
</head>
<body>
    <header>

    </header>
    <main>
        <article>
            <div class="gallery" id="gallery">
                <div class="card">
                    <h2>Название</h2>
                    <p class="cardDescription">Описание</p>
                    <img src="images/2248036369a45c1555a433.48884101.jpg" alt="Описание">
                    <p class="cardAuthor">Автор</p>
                </div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
            </div>
        </article>  
        <dialog id="imageModal" aria-labelledby="modalTitle" aria-describedby="modalContent">
            <button class="close-btn" aria-label="Закрыть" onclick="closeModal()">×</button>
            <img id="modalImage" alt="Полное изображение проекта">
        </dialog>       
    </main>
    <footer>

    </footer>
    <script>        
            const gallery = document.getElementById("gallery");
            gallery.innerHTML = "";
            projects.forEach((item) => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <h2>${item.name}</h2>
                    <p>${item.description}</p>
                    <img src="${item.image}" alt="Описание" onclick="openModal('${item.image}')">
                    <p class="cardAuthor">${item.author}</p>
                `;
                card.addEventListener("click", function(event){
                    console.log(event);
                    console.log(this);                    
                    if (event.target.tagName != "IMG")
                        window.location.href = `project.html?id=${item.id}`;
                });
                gallery.append(card);
            }); 
    </script>
</body>
</html>
